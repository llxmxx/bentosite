<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>bento grid</title>
</head>
<body>
    <div class="grid">
        <div class="card wide">
        </div>
        <div class="card tall">
        </div>
        <div class="card large">
        </div>
        <div class="card circle">
        </div>

        <div class="orb" id="orb"></div>


        <script>
            const orb = document.getElementById('orb');
            let dragging = false;
            let offsetX = 0;
            let offsetY = 0;

            orb.addEventListener('mousedown', (e) => {
                dragging = true;
                offsetX = e.clientX - orb.offsetLeft;
                offsetY = e.clientY - orb.offsetTop;
                orb.style.cursor = "grabbing";
            })
            document.addEventListener('mousemove', (e) => {
                if(!dragging) return;
                orb.style.left = `${e.clientX - offsetX}px`;
                orb.style.top = `${e.clientY - offsetY}px`;
            })
            document.addEventListener('mouseup', () => {
                dragging = false;
                orb.style.cursor = "grab";
            })
        </script>
    </div>
</body>
</html>
